<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 170" width="640" height="170" role="img" aria-label="Nolwazi Mkhabela">
  <defs>
    <linearGradient id="nm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e27361"/>
      <stop offset="1" stop-color="#6280f0"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;family=Poppins:wght@600;800&amp;display=swap');
      .name{font-family:'Dancing Script','Segoe Script',cursive;font-weight:700;fill:#16181d}
      .mono{font-family:'Poppins','Arial',sans-serif;font-weight:800;fill:#ffffff}
      .tag{font-family:'Poppins','Arial',sans-serif;font-weight:600;fill:#6280f0;letter-spacing:5px}
    </style>
  </defs>

  <!-- monogram badge -->
  <rect x="14" y="30" width="110" height="110" rx="28" fill="url(#nm-grad)"/>
  <text x="69" y="86" text-anchor="middle" dominant-baseline="central" class="mono" font-size="50" letter-spacing="-3">NM</text>

  <!-- wordmark -->
  <text x="150" y="98" class="name" font-size="66">Nolwazi Mkhabela</text>
  <!-- accent underline -->
  <rect x="152" y="112" width="300" height="4" rx="2" fill="url(#nm-grad)"/>
  <!-- tagline -->
  <text x="154" y="138" class="tag" font-size="13">SPEAKER · INVESTOR · LEADER</text>
</svg>
